server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: studyhelper-backend
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/studyhelper?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.studyhelper.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: StudyHelperSecretKey2026ForJwtTokenGenerationMustBeAtLeast256Bits
  expiration: 86400000  # 24小时
  header: Authorization
  prefix: Bearer

# Redis 配置 (可选)
# spring.data.redis:
#   host: localhost
#   port: 6379
#   password:
#   database: 0

# 日志配置
logging:
  level:
    com.studyhelper: debug
    com.baomidou.mybatisplus: info
